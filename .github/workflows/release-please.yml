name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Prefer dedicated token so release PRs trigger downstream workflows.
          # Fallback to default github.token to keep workflow operational when
          # RELEASE_PLEASE_TOKEN is not configured yet.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
