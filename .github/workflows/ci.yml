name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Smoke
        run: |
          echo "Monorepo root CI — umbrella job."
          echo "Per-language jobs (lint / typecheck / test / build / e2e) are added as packages land."

      - name: Shellcheck (lint shell scripts)
        run: |
          if ls scripts/**/*.sh scripts/*.sh 1> /dev/null 2>&1 || find scripts -type f -name '*.sh' | grep -q .; then
            find scripts -type f -name '*.sh' -print0 | xargs -0 shellcheck
          else
            echo "No shell scripts under scripts/ — skipping."
          fi

      - name: Handoff validator tests
        run: bash scripts/tests/test-validate-handoff.sh

      - name: Validate all handoffs
        run: |
          shopt -s nullglob
          files=( .ai/handoffs/PTR-*.md )
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No handoff files (.ai/handoffs/PTR-*.md) — skipping."
            exit 0
          fi
          status=0
          for f in "${files[@]}"; do
            echo "::group::Validating $f"
            if ! bash scripts/validate-handoff.sh "$f"; then
              status=1
            fi
            echo "::endgroup::"
          done
          exit "$status"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: packages/ptr_coder/pyproject.toml

      - name: Install ptr_coder (dev)
        run: |
          python -m pip install -U pip
          pip install -e "./packages/ptr_coder[dev]"

      - name: pytest (ptr_coder)
        run: pytest packages/ptr_coder/tests -q

      - name: Install uv (backend)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "apps/backend/uv.lock"

      - name: Ruff + pytest (apps/backend)
        working-directory: apps/backend
        run: |
          uv sync --frozen --group dev
          uv run ruff check .
          uv run ruff format --check .
          uv run pytest -q

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Biome + typecheck (apps/frontend)
        working-directory: apps/frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run lint:ci
          pnpm run typecheck
